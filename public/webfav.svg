<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Core Glow -->
    <radialGradient id="glow" cx="32" cy="32" r="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#e879f9" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#c084fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7e22ce" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Primary Crystal Grad -->
    <linearGradient id="crystal1" x1="32" y1="2" x2="32" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Secondary Crystal Grad -->
    <linearGradient id="crystal2" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5d0fe"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a855f7" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Ambient background glow (fills the box smoothly) -->
  <circle cx="32" cy="32" r="32" fill="url(#glow)" />

  <!-- Diagonal smaller star (background layer) -->
  <path d="M32 16 L38 26 L48 32 L38 38 L32 48 L26 38 L16 32 L26 26 Z" fill="url(#crystal2)" opacity="0.8"/>

  <!-- Main large vertical/horizontal sharp star -->
  <path d="M32 2 L36 28 L62 32 L36 36 L32 62 L28 36 L2 32 L28 28 Z" fill="url(#crystal1)" filter="url(#shadow)"/>
  
  <!-- Central intense highlight (diamond) -->
  <path d="M32 20 L35 29 L44 32 L35 35 L32 44 L29 35 L20 32 L29 29 Z" fill="#ffffff"/>
</svg>
